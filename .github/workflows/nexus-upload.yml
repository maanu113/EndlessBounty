name: Publish to Nexus Mods

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release DLL
        run: dotnet build -c Release

      - name: Package mod zip
        run: |
          mkdir -p package/BepInEx/plugins/EndlessBounty
          cp bin/Release/net472/EndlessBounty.dll package/BepInEx/plugins/EndlessBounty/
          cp lib/SineusModding.Api.dll package/BepInEx/plugins/
          cd package && zip -r ../EndlessBounty-${{ steps.ver.outputs.version }}.zip .

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.9
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: "7688037"
          filename: EndlessBounty-${{ steps.ver.outputs.version }}.zip
          version: ${{ steps.ver.outputs.version }}
          category: main
          archive_existing_version: true
          update_mod_version: true
