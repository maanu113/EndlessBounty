name: Publish to Nexus Mods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to Nexus (e.g. v1.0.1)"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Derive version from release tag
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.zip" \
            --output "EndlessBounty-${{ steps.ver.outputs.version }}.zip"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.9
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: "7688037"
          filename: EndlessBounty-${{ steps.ver.outputs.version }}.zip
          version: ${{ steps.ver.outputs.version }}
          category: main
          archive_existing_version: true
          update_mod_version: true
